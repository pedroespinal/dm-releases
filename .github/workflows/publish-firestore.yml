name: Publicar actualización en Firestore

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej: 1.3.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Extraer versión del tag
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Actualizar Firestore meta/app
        env:
          FIREBASE_API_KEY: AIzaSyAMWdcP3nD9US6gghzF9ZDCwl7DYzwKsTo
          FIREBASE_EMAIL: stonepiedra1976@gmail.com
          FIREBASE_PASSWORD: ${{ secrets.FIREBASE_PASSWORD }}
          VERSION: ${{ steps.ver.outputs.VERSION }}
          NOTES: ${{ github.event.release.body }}
        run: |
          echo "🔑 Autenticando en Firebase..."
          AUTH_RESPONSE=$(curl -s -X POST \
            "https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FIREBASE_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${FIREBASE_EMAIL}\",\"password\":\"${FIREBASE_PASSWORD}\",\"returnSecureToken\":true}")

          # Log error if present (without leaking the token)
          ERROR_MSG=$(echo "$AUTH_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',{}).get('message',''))" 2>/dev/null || echo "")
          if [ -n "$ERROR_MSG" ]; then
            echo "❌ Firebase Auth error: $ERROR_MSG"
            exit 1
          fi

          TOKEN=$(echo "$AUTH_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('idToken',''))" 2>/dev/null || echo "")
          if [ -z "$TOKEN" ]; then
            echo "❌ Error: token vacío — respuesta inesperada de Firebase"
            exit 1
          fi

          echo "📝 Actualizando Firestore..."
          RELEASED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DOWNLOAD_URL="https://github.com/pedroespinal/dm-releases/releases/download/v${VERSION}/DonorMe-v${VERSION}.apk"

          RESULT=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "https://firestore.googleapis.com/v1/projects/donorme-92c76/databases/(default)/documents/meta/app" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"fields\": {
                \"latest_version\": {\"stringValue\": \"${VERSION}\"},
                \"download_url\":   {\"stringValue\": \"${DOWNLOAD_URL}\"},
                \"release_notes\":  {\"stringValue\": \"${NOTES}\"},
                \"released_at\":    {\"stringValue\": \"${RELEASED_AT}\"}
              }
            }")

          if [ "$RESULT" = "200" ]; then
            echo "✅ Firestore actualizado: latest_version = ${VERSION}"
            echo "   URL: ${DOWNLOAD_URL}"
          else
            echo "❌ Error al actualizar Firestore (HTTP ${RESULT})"
            exit 1
          fi
